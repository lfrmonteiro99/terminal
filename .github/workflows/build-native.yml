name: Build Native Packages

on:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            pkg-config

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.88'

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version '^2'

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Build Tauri app
        run: cd crates/terminal-app && cargo tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ''

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: terminal-deb
          path: crates/terminal-app/target/release/bundle/deb/*.deb

      - name: Upload .AppImage
        uses: actions/upload-artifact@v4
        with:
          name: terminal-appimage
          path: crates/terminal-app/target/release/bundle/appimage/*.AppImage

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            crates/terminal-app/target/release/bundle/deb/*.deb
            crates/terminal-app/target/release/bundle/appimage/*.AppImage
