services:
  # --- Run the full app: docker compose up ---
  daemon:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - daemon-data:/data
      - ./scripts:/app/scripts:ro
    environment:
      - TERMINAL_HOST=0.0.0.0
      - TERMINAL_PORT=3000
      - TERMINAL_DATA_DIR=/data
      - TERMINAL_AUTH_TOKEN=dev-token-123
      - RUST_LOG=info

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    # VITE_DAEMON_WS_URL was removed (#85): the frontend now resolves the WS
    # URL at runtime via `resolveDaemonWsUrl()` — same-origin `/ws` by default,
    # proxied in dev through Vite. Set `window.__TERMINAL_CONFIG__.wsUrl` if
    # you need to point the built bundle at a different daemon.
    depends_on:
      - daemon

  # --- Run tests: docker compose run --rm test ---
  test:
    build:
      context: .
      dockerfile: Dockerfile.dev
    working_dir: /app
    volumes:
      - .:/app
      - cargo-cache:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - target-cache:/app/target
    command: cargo test -p terminal-core -p terminal-daemon
    privileged: true  # required for PTY operations (/dev/ptmx, /dev/pts)
    profiles:
      - test

volumes:
  daemon-data:
  cargo-cache:
  cargo-git:
  target-cache:
